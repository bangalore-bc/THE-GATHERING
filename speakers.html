<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <title>All Voices - The Gathering</title>
    <link rel="stylesheet" href="design.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "label-bold": ["Inter", "sans-serif"]
                    }
                }
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('https://gathering.blessingtoday.org/api/data');
                if (res.ok) {
                    const data = await res.json();
                    const container = document.getElementById('all-speakers');
                    
                    if (data.speakers && data.speakers.length > 0) {
                        const voicesSpeakers = data.speakers.filter(s => s.isVoicesFeatured);
                        if (voicesSpeakers.length > 0) {
                            voicesSpeakers.forEach((speaker, index) => {
                            const isEven = index % 2 === 0;
                            const el = document.createElement('div');
                            el.id = `speaker-${speaker.id}`;
                            el.className = "scroll-section snap-start w-full h-screen flex items-center justify-center px-4 sm:px-6 lg:px-12";
                            
                            const numberStr = (index + 1).toString().padStart(2, '0');
                            const buttonText = isEven ? 'Latest Message' : 'Portfolio Review';
                            const defaultAbout = 'Specializing in their respective fields, they translate spiritual concepts into impactful experiences. Their work emphasizes the removal of the superfluous to reveal the inherent truth in raw, unadorned materials.';
                            
                            const textContent = `
                                <div class="flex-1 flex flex-col justify-center ${isEven ? 'order-2 md:order-1 pr-0 md:pr-12' : 'order-2 md:order-2 pl-0 md:pl-12'}">
                                    <div class="flex items-center gap-4 mb-4 sm:mb-6">
                                        <span class="font-label-bold text-stone-300 text-base sm:text-lg">${numberStr}</span>
                                        ${!isEven ? '<div class="h-[2px] bg-stone-900 w-full max-w-[80px] sm:max-w-[120px]"></div>' : ''}
                                    </div>
                                    <h3 class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold uppercase mb-2 text-stone-900 tracking-tighter">${speaker.name}</h3>
                                    <span class="font-label-bold text-[10px] uppercase text-stone-500 tracking-widest block mb-6 sm:mb-8">${speaker.title}</span>
                                    <p class="font-body-md text-stone-600 text-sm leading-relaxed mb-6 sm:mb-10 max-w-md">
                                        ${speaker.about || defaultAbout}
                                    </p>
                                    <div class="flex items-center gap-6 mt-2">
                                        ${speaker.socials && speaker.socials.yt ? `<a href="${speaker.socials.yt}" target="_blank" class="text-stone-400 hover:text-black transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12l-6.5-3.5v7l6.5-3.5z"></path><rect x="2" y="6" width="20" height="12" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"></rect></svg></a>` : ''}
                                        ${speaker.socials && speaker.socials.fb ? `<a href="${speaker.socials.fb}" target="_blank" class="text-stone-400 hover:text-black transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"></path></svg></a>` : ''}
                                        ${speaker.socials && speaker.socials.ig ? `<a href="${speaker.socials.ig}" target="_blank" class="text-stone-400 hover:text-black transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path stroke-linecap="round" stroke-linejoin="round" d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>` : ''}
                                    </div>
                                </div>
                            `;

                            const imageContent = `
                                    <div class="flex-1 w-full ${isEven ? 'order-1 md:order-2' : 'order-1 md:order-1'}">
                                        <div class="w-full rounded-2xl overflow-hidden shadow-2xl bg-stone-100 flex items-center justify-center">
                                            <img src="${speaker.photo ? (speaker.photo.startsWith('http') ? speaker.photo : 'https://gathering.blessingtoday.org/' + speaker.photo) : 'img/placeholder.jpg'}" alt="${speaker.name}" class="speaker-img w-full h-auto max-h-[600px] object-cover rounded-2xl transition-all duration-700">
                                        </div>
                                    </div>
                                `;

                                el.innerHTML = `<div class="max-w-[1440px] w-full mx-auto flex flex-col md:flex-row items-center gap-8 sm:gap-12 lg:gap-24">${isEven ? textContent + imageContent : imageContent + textContent}</div>`;
                                container.appendChild(el);
                                });

                                // Add Intersection Observer for focus effect
                                const observer = new IntersectionObserver((entries) => {
                                    entries.forEach(entry => {
                                        if (entry.isIntersecting) {
                                            entry.target.classList.add('in-focus');
                                        } else {
                                            entry.target.classList.remove('in-focus');
                                        }
                                    });
                                }, { threshold: 0.5 });

                                document.querySelectorAll('#all-speakers > div').forEach(el => observer.observe(el));
                        } else {
                            container.innerHTML = '<p class="col-span-full text-center text-stone-500 py-12">No voices found.</p>';
                        }

                        // Check hash and scroll to targeted speaker
                        if (window.location.hash) {
                            setTimeout(() => {
                                const target = document.querySelector(window.location.hash);
                                if (target) {
                                    target.scrollIntoView({ behavior: 'smooth' });
                                }
                            }, 100);
                        }
                    } else {
                        container.innerHTML = '<p class="col-span-full text-center text-stone-500 py-12">No voices found.</p>';
                    }
                }
            } catch (err) {
                console.error(err);
                document.getElementById('all-speakers').innerHTML = '<p class="col-span-full text-center text-red-500 py-12">Failed to load voices. Ensure backend is running.</p>';
            }
        });
    </script>
    <style>
        .speaker-img {
            filter: grayscale(100%);
            transition: filter 0.7s ease-in-out;
        }
        .in-focus .speaker-img {
            filter: grayscale(0%);
            transition-delay: 0.3s;
        }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Abstract Blobs */
        .blob {
            transition: transform 0.2s ease-out;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            top: 20%;
            left: 10%;
            animation: float-1 20s infinite alternate ease-in-out;
        }
        .blob-2 {
            width: 500px;
            height: 500px;
            bottom: 10%;
            right: 10%;
            animation: float-2 25s infinite alternate ease-in-out;
        }
        .blob-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            animation: float-3 15s infinite alternate ease-in-out;
        }
        
        @keyframes float-1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }
        @keyframes float-2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, -50px) scale(0.9); }
        }
        @keyframes float-3 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, 50px) scale(1.2); }
        }
    </style>
</head>
<body class="bg-[#f9f9f9] text-stone-900 font-body-md">
    <!-- Simple Navbar -->
    <header class="bg-white border-b-2 border-stone-200 py-3 sm:py-4 px-4 sm:px-6 md:px-12 fixed top-0 left-0 right-0 z-50">
        <div class="max-w-[1440px] mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 sm:gap-4 hover:opacity-80 transition">
                <span class="material-symbols-outlined text-xl sm:text-2xl">arrow_back</span>
                <span class="font-label-bold uppercase text-[10px] sm:text-sm tracking-widest">Back to Gathering</span>
            </a>
            <div class="text-xl font-black tracking-tighter">
                <img alt="The Gathering Logo" class="h-6 sm:h-8 w-auto object-contain brightness-0" src="img/Gathering.png">
            </div>
        </div>
    </header>

    <main class="snap-y snap-mandatory h-screen overflow-y-auto no-scrollbar" id="main-scroll">
        <!-- Title Section -->
        <section class="scroll-section snap-start w-full h-screen flex flex-col justify-center px-4 sm:px-6 lg:px-12 pt-20 relative overflow-hidden">
            <!-- Abstract Background -->
            <div class="absolute inset-0 -z-10">
                <div class="blob-container absolute top-0 left-0 w-full h-full">
                    <div class="blob blob-1 absolute bg-stone-200/50 rounded-full blur-3xl filter opacity-70"></div>
                </div>
                <div class="blob-container absolute top-0 left-0 w-full h-full">
                    <div class="blob blob-2 absolute bg-stone-300/50 rounded-full blur-3xl filter opacity-50"></div>
                </div>
                <div class="blob-container absolute top-0 left-0 w-full h-full">
                    <div class="blob blob-3 absolute bg-stone-100/70 rounded-full blur-3xl filter opacity-80"></div>
                </div>
            </div>
            
            <div class="max-w-[1440px] w-full mx-auto relative z-10">
                <h1 class="font-display text-3xl sm:text-5xl md:text-7xl font-bold uppercase tracking-tighter border-l-[3px] sm:border-l-4 border-black pl-5 sm:pl-8">The Collective Voices</h1>
                <p class="font-body-md text-stone-500 mt-4 text-sm uppercase tracking-widest">Scroll to explore</p>
            </div>
        </section>
        
        <div id="all-speakers" class="w-full">
            <!-- Dynamic Content -->
        </div>
    </main>
    <script>
        // Parallax Effect for Blobs
        const mainScroll = document.getElementById('main-scroll');
        const containers = document.querySelectorAll('.blob-container');
        if (mainScroll) {
            mainScroll.addEventListener('scroll', () => {
                const scrolled = mainScroll.scrollTop;
                containers.forEach((el, index) => {
                    const speed = (index + 1) * 0.15;
                    el.style.transform = `translateY(${scrolled * speed}px)`;
                });
            });
        }
    </script>
</body>
</html>
